<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sow's Pantry">
<meta name="theme-color" content="#2e7d32">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href="icon.svg">
<title>Sow's Pantry — health-first meal planner</title>
<style>
  :root{--g:#2e7d32;--g2:#e8f5e9;--bg:#fafafa;--card:#fff;--line:#e0e0e0;--warn:#e65100;--red:#c62828;--txt:#212121;--mut:#757575}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--txt);padding-bottom:80px}
  header{background:var(--g);color:#fff;padding:14px 16px;padding-top:calc(14px + env(safe-area-inset-top));position:sticky;top:0;z-index:10}
  header h1{margin:0;font-size:20px;font-weight:600}
  header .sub{font-size:12px;opacity:.85;margin-top:2px}
  main{padding:12px;max-width:820px;margin:0 auto}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
  .row{display:flex;align-items:center;gap:10px}
  .row.sb{justify-content:space-between}
  h2{font-size:16px;margin:0 0 10px}
  .item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
  .item:last-child{border-bottom:none}
  .item .nm{flex:1;min-width:0}
  .item .nm b{display:block;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .item .nm small{color:var(--mut);font-size:12px}
  .qty{font-variant-numeric:tabular-nums;font-weight:600;min-width:70px;text-align:right}
  .low{color:var(--red)}
  button{font-family:inherit;font-size:15px;border:none;border-radius:10px;padding:10px 14px;background:var(--g2);color:var(--g);font-weight:600;cursor:pointer;min-height:44px}
  button.p{background:var(--g);color:#fff}
  button.sm{padding:6px 10px;min-height:36px;font-size:14px}
  button.g{background:#f0f0f0;color:var(--txt)}
  button.danger{background:#ffebee;color:var(--red)}
  input,select{font-family:inherit;font-size:16px;padding:10px;border:1px solid var(--line);border-radius:10px;background:#fff;width:100%;min-height:44px}
  .grid{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center}
  .stepper{display:flex;align-items:center;gap:6px}
  .stepper button{width:40px;padding:0;font-size:20px}
  label{font-size:13px;color:var(--mut);display:block;margin-bottom:4px}
  nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:10}
  nav button{flex:1;background:none;border-radius:0;color:var(--mut);font-size:11px;font-weight:500;padding:8px 0;display:flex;flex-direction:column;align-items:center;gap:2px;min-height:56px}
  nav button.on{color:var(--g)}
  nav .ic{font-size:22px}
  .tag{display:inline-block;background:var(--g2);color:var(--g);font-size:12px;padding:3px 8px;border-radius:20px;margin:2px 4px 2px 0}
  .chips{display:flex;gap:8px;overflow-x:auto;padding:2px 0 6px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;background:#fff;border:1px solid var(--line);color:var(--txt);font-size:13px;font-weight:600;padding:7px 14px;border-radius:20px;min-height:auto;white-space:nowrap}
  .chip.on{background:var(--g);color:#fff;border-color:var(--g)}
  .thumb{width:52px;height:52px;border-radius:50%;background:var(--g2);display:flex;align-items:center;justify-content:center;font-size:26px;overflow:hidden;flex:0 0 auto;cursor:pointer}
  .thumb img{width:100%;height:100%;object-fit:cover}
  .badge{background:var(--red);color:#fff;border-radius:20px;font-size:11px;padding:1px 6px;position:absolute;top:4px;right:calc(50% - 26px)}
  .empty{text-align:center;color:var(--mut);padding:30px 10px}
  .meal{border-left:4px solid var(--g);padding:8px 12px;margin-bottom:8px;background:var(--g2);border-radius:0 10px 10px 0}
  .meal b{font-size:15px}
  .meal small{color:#555;display:block}
  .canmake{color:var(--g);font-weight:600;font-size:12px}
  .cantmake{color:var(--warn);font-weight:600;font-size:12px}
  dialog{border:none;border-radius:16px;padding:18px;width:92%;max-width:440px;box-shadow:0 10px 40px rgba(0,0,0,.25)}
  dialog::backdrop{background:rgba(0,0,0,.4)}
  .fld{margin-bottom:12px}
  .fab{position:fixed;right:16px;bottom:76px;bottom:calc(76px + env(safe-area-inset-bottom));width:56px;height:56px;border-radius:50%;background:var(--g);color:#fff;font-size:28px;box-shadow:0 4px 12px rgba(0,0,0,.3);z-index:9;padding:0}
  .toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:#323232;color:#fff;padding:12px 18px;border-radius:24px;font-size:14px;z-index:20;opacity:0;transition:opacity .2s;max-width:90%;text-align:center}
  .toast.show{opacity:1}
  .ingline{display:grid;grid-template-columns:1fr 70px 70px 30px;gap:6px;margin-bottom:6px;align-items:center}
  .ingline input,.ingline select{padding:8px;font-size:14px;min-height:38px}
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:16px;border-radius:10px;background:var(--g2);outline:none;padding:0;margin:10px 0}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:42px;height:42px;border-radius:50%;background:var(--g);box-shadow:0 2px 8px rgba(0,0,0,.35);cursor:pointer}
  input[type=range]::-moz-range-thumb{width:42px;height:42px;border:none;border-radius:50%;background:var(--g);box-shadow:0 2px 8px rgba(0,0,0,.35)}
  .qsval{text-align:center;font-size:44px;font-weight:700;color:var(--g);line-height:1}
  .qsu{font-size:18px;color:var(--mut);font-weight:500}
  .qty{cursor:pointer}
</style>
</head>
<body>
<header>
  <div class="row sb">
    <div><h1 id="title">🥗 Sow's Pantry</h1>
    <div class="sub" id="sub">Loading…</div></div>
    <button class="sm g" style="background:rgba(255,255,255,.2);color:#fff" onclick="settings()"><span id="syncDot">⚙︎</span></button>
  </div>
</header>
<main id="view"></main>

<button class="fab" id="fab" onclick="fabAction()">+</button>

<nav>
  <button data-tab="meals" class="on" onclick="go('meals')"><span class="ic">🥗</span>Today</button>
  <button data-tab="track" onclick="go('track')"><span class="ic">📈</span>Track</button>
  <button data-tab="cook" onclick="go('cook')"><span class="ic">🍳</span>Cook</button>
  <button data-tab="pantry" onclick="go('pantry')"><span class="ic">🥫</span>Pantry</button>
  <button data-tab="shop" onclick="go('shop')" style="position:relative"><span class="ic">🛒</span>Order<span class="badge" id="shopBadge" style="display:none">0</span></button>
</nav>

<div class="toast" id="toast"></div>

<script src="data.js"></script>
<script>
"use strict";
// ---------- storage ----------
const KEY = "pantry.v2";   // bumped: verified longevity meal DB
const UNITS = ["g","kg","ml","L","pcs","cup","tbsp","tsp","pack"];
// per-adult daily targets — from verified research (adjust for kids/activity; see disclaimer)
const TARGET = (window.HEALTH && HEALTH.targets) || {protein_g:90, fiber_g:28, kcal:2000};
let S = load();

function load(){
  try{ const d = JSON.parse(localStorage.getItem(KEY)); if(d) return d; }catch(e){}
  return seed();
}
function save(){ localStorage.setItem(KEY, JSON.stringify(S)); refreshBadge(); }

// ---------- seed: verified longevity meal DB + derived pantry (qty are PER PERSON) ----------
function seed(){
  const pantry = (window.PANTRY_SEED||[]).map(p=>({id:id(), ...p}));
  const dishes = (window.HEALTHY_DISHES||[]).map(d=>({id:id(), ...d}));
  return { pantry, dishes, shop:[], log:[] };
}
function id(){ return Math.random().toString(36).slice(2,9); }

// ---------- helpers ----------
function findPantry(name){ return S.pantry.find(p=>p.name.toLowerCase()===name.toLowerCase()); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2600); }
function refreshBadge(){ const n=S.shop.filter(s=>!s.checked).length; const b=document.getElementById('shopBadge'); b.style.display=n?'inline-block':'none'; b.textContent=n; }
function fmt(q){ return Math.round(q*10)/10; }

// add/merge an item into shopping list
function addToShop(name, unit, need){
  const ex = S.shop.find(s=>s.name.toLowerCase()===name.toLowerCase() && !s.checked);
  if(ex){ ex.need = Math.max(ex.need, Math.ceil(need)); }
  else S.shop.push({id:id(), name, unit, need:Math.ceil(need), checked:false});
}
// after any pantry change, auto-flag low items to the order list
function autoRestock(){
  S.pantry.forEach(p=>{
    if(p.qty <= p.low){
      const target = p.low*3; // restock to ~3x threshold
      addToShop(p.name, p.unit, target - p.qty);
    }
  });
}

// ---------- routing ----------
let TAB = "pantry";
function go(tab){ TAB=tab; document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('on', b.dataset.tab===tab)); render(); }
function render(){ ensureModel(); ({pantry:renderPantry, cook:renderCook, meals:renderMeals, shop:renderShop, track:renderTrack}[TAB])(); refreshBadge(); }

// ---------- PANTRY ----------
function renderPantry(){
  document.getElementById('sub').textContent = S.pantry.length + " items tracked";
  const list = [...S.pantry].sort((a,b)=> (a.qty<=a.low?-1:0)-(b.qty<=b.low?-1:0) || a.name.localeCompare(b.name));
  let h = `<div class="card"><h2>Pantry stock</h2>`;
  if(!list.length) h+=`<div class="empty">Empty. Tap + to add items.</div>`;
  list.forEach(p=>{
    const low = p.qty<=p.low;
    h+=`<div class="item">
      <div class="nm"><b>${esc(p.name)}</b><small>${low?'⚠️ low · ':''}min ${p.low}${p.unit}</small></div>
      <div class="stepper">
        <button class="sm g" onclick="bump('${p.id}',-1)">−</button>
        <div class="qty ${low?'low':''}" onclick="quickSet('${p.id}')">${fmt(p.qty)}<small style="color:var(--mut)">${p.unit}</small></div>
        <button class="sm g" onclick="bump('${p.id}',1)">+</button>
      </div>
      <button class="sm g" onclick="editItem('${p.id}')">✎</button>
    </div>`;
  });
  h+=`</div>`;
  document.getElementById('view').innerHTML = h;
}
function bump(pid, dir){
  const p = S.pantry.find(x=>x.id===pid); if(!p) return;
  const step = p.unit==='g'||p.unit==='ml' ? 50 : 1;
  p.qty = Math.max(0, fmt(p.qty + dir*step));
  autoRestock(); save(); renderPantry();
}
// quick slider set — dynamic range per item, no typing
function quickSet(pid){
  const p = S.pantry.find(x=>x.id===pid); if(!p) return;
  const step = (p.unit==='g'||p.unit==='ml') ? 25 : 1;
  const cap  = Math.max(step*10, Math.ceil(Math.max(p.qty, p.low*3)*1.5/step)*step); // room above current/low
  window._qs = p.qty;
  dlg(`<h2 style="text-align:center">${esc(p.name)}</h2>
    <div class="qsval" id="qsVal">${fmt(p.qty)}<span class="qsu">${p.unit}</span></div>
    <input type="range" min="0" max="${cap}" step="${step}" value="${p.qty}" oninput="qsSlide(this,'${p.unit}')">
    <div class="row sb" style="font-size:12px;color:var(--mut);margin-top:-4px"><span>0</span><span>${cap}${p.unit}</span></div>
    <div class="row" style="gap:8px;margin-top:16px">
      <button class="g" onclick="qsSlide2(-${step},'${p.unit}',${cap})">−${step}</button>
      <button class="g" onclick="qsSlide2(${step},'${p.unit}',${cap})">+${step}</button>
      <button class="p" style="flex:1" onclick="quickSave('${p.id}')">Save</button></div>`);
}
function qsSlide(el,unit){ window._qs=+el.value; document.getElementById('qsVal').innerHTML=el.value+'<span class="qsu">'+unit+'</span>'; }
function qsSlide2(d,unit,cap){ // nudge buttons for precision, keep slider in sync
  window._qs=Math.min(cap,Math.max(0,fmt(window._qs+d)));
  document.querySelector('#dlg input[type=range]').value=window._qs;
  document.getElementById('qsVal').innerHTML=window._qs+'<span class="qsu">'+unit+'</span>';
}
function quickSave(pid){ const p=S.pantry.find(x=>x.id===pid); if(!p)return; p.qty=fmt(window._qs); autoRestock(); save(); closeDlg(); renderPantry(); }

// ---------- COOK (the core: deduct on cook) ----------
function renderCook(){
  document.getElementById('sub').textContent = "Log what you cooked → stock updates";
  let h = `<div class="card"><div class="row sb"><h2>I cooked…</h2>
      <button class="sm p" onclick="addDish()">＋ New recipe</button></div>
    <div class="fld"><label>Dish</label>
      <select id="ckDish">${S.dishes.map(d=>`<option value="${d.id}">${esc(d.name)} · ${d.meal}</option>`).join('')}</select></div>
    <div class="fld"><label>For how many people?</label>
      <div class="stepper"><button class="g" onclick="ppl(-1)">−</button>
      <input id="ckPpl" type="number" value="4" min="1" style="text-align:center;max-width:90px" oninput="previewCook()">
      <button class="g" onclick="ppl(1)">+</button></div></div>
    <div id="ckPreview"></div>
    <button class="p" style="width:100%" onclick="doCook()">Cook & reduce pantry</button>
  </div>`;
  // recent log
  if(S.log.length){
    h+=`<div class="card"><h2>Recent</h2>`;
    S.log.slice(-8).reverse().forEach(l=>{ h+=`<div class="item"><div class="nm"><b>${esc(l.dish)}</b><small>${l.ts}</small></div><div class="qty">${l.people}👤</div></div>`; });
    h+=`</div>`;
  }
  document.getElementById('view').innerHTML = h;
  document.getElementById('ckDish').onchange = previewCook;
  previewCook();
}
function ppl(d){ const el=document.getElementById('ckPpl'); el.value=Math.max(1,(+el.value||1)+d); previewCook(); }
function currentCook(){
  const d = S.dishes.find(x=>x.id===document.getElementById('ckDish').value);
  const n = Math.max(1, +document.getElementById('ckPpl').value||1);
  return {d,n};
}
function previewCook(){
  const {d,n} = currentCook(); if(!d) return;
  let ok=true, rows='';
  d.ing.forEach(i=>{
    const need = i.qty*n, p = findPantry(i.name);
    const have = p? p.qty : 0, short = have < need;
    if(short) ok=false;
    rows+=`<div class="item"><div class="nm"><b>${esc(i.name)}</b><small>have ${fmt(have)}${p?p.unit:i.unit}</small></div>
      <div class="qty ${short?'low':''}">−${fmt(need)}${i.unit}${short?' ⚠️':''}</div></div>`;
  });
  document.getElementById('ckPreview').innerHTML =
    `<div class="card" style="margin:0 0 12px;background:var(--g2);border:none">
      <div class="row sb"><b>Will deduct (${n} ppl)</b><span class="${ok?'canmake':'cantmake'}">${ok?'✓ enough stock':'⚠️ short — will add to Order'}</span></div>${rows}</div>`;
}
function doCook(){
  const {d,n} = currentCook(); if(!d) return;
  d.ing.forEach(i=>{
    let p = findPantry(i.name);
    const need = i.qty*n;
    if(!p){ p = {id:id(), name:i.name, qty:0, unit:i.unit, low:Math.ceil(i.qty)}; S.pantry.push(p); }
    p.qty = Math.max(0, fmt(p.qty - need));
  });
  S.log.push({ts:new Date().toLocaleString(), dish:d.name, people:n});
  ensureModel();
  if(d.healthy) award('cook_healthy_dish',true);
  if(d.swapsFor || (d.tags||[]).some(t=>/millet|low-gi|low-glycemic/i.test(t))) award('whole_grain_swap',true);
  autoRestock(); save();
  toast(`✅ Made ${d.name} · +points earned 🌟`);
  go('pantry');
}

// ---------- MEALS: health-first suggester (the hero screen) ----------
const MEALS = [["breakfast","🌅","Breakfast"],["lunch","☀️","Lunch"],["dinner","🌙","Dinner"],["snack","🍵","Snack"]];
let mealOff = {breakfast:0,lunch:0,dinner:0,snack:0};   // "swap" offset for alternatives
let cuisineFilter = "All";
function cuisineList(){ return ["All", ...[...new Set(S.dishes.map(d=>d.cuisine).filter(Boolean))].sort()]; }
function dishesFor(m){ return S.dishes.filter(d=>d.healthy && d.meal===m && (cuisineFilter==="All" || d.cuisine===cuisineFilter)); }
function setCuisine(c){ cuisineFilter=c; renderMeals(); }
function pickDish(m){ const a=dishesFor(m); if(!a.length) return null;
  return a[((new Date().getDate())+mealOff[m])%a.length]; }
// derive health highlights from ingredients — dynamic, no manual data
function healthTags(d){
  const n=d.ing.map(i=>i.name.toLowerCase()).join(' '); const t=[];
  if(/dal|paneer|curd|yogurt|urad|moong|toor|egg|milk|sprout/.test(n)) t.push("💪 protein");
  if(/spinach|palak|methi|carrot|tomato|onion|greens|vegetable|beans|capsicum/.test(n)) t.push("🌿 veggies");
  if(/oats|atta|ragi|millet|wheat|brown rice|idli rava/.test(n)) t.push("🌾 whole-grain");
  if(/curd|yogurt/.test(n)) t.push("🥛 gut-friendly");
  if(!/oil|ghee/.test(n)||/steam|idli/.test(n)) t.push("🪶 light");
  return t.slice(0,3);
}
// nutrition meter bar
function bar(label, val, target, unit, good){
  const pct = Math.min(100, Math.round(val/target*100));
  const col = good ? (pct>=100?'#2e7d32':pct>=60?'#f9a825':'#e65100')  // more is better (protein/fiber)
                   : (pct<=100?'#2e7d32':'#e65100');                    // less is better (kcal ceiling)
  return `<div style="margin:8px 0">
    <div class="row sb" style="font-size:12px"><span>${label}</span><b>${Math.round(val)}/${target}${unit}</b></div>
    <div style="height:10px;background:#eee;border-radius:6px;overflow:hidden;margin-top:3px">
      <div style="height:100%;width:${pct}%;background:${col};border-radius:6px"></div></div></div>`;
}
function renderMeals(){
  document.getElementById('sub').textContent = "Sowndarya's healthy plan for today";
  // pick the 3 meals first, then score the day's nutrition
  const picks = MEALS.map(([m,icon,label])=>({m,icon,label,d:pickDish(m)}));
  const tot = picks.reduce((a,{d})=>{ if(d){a.p+=(+d.protein_g||0);a.f+=(+d.fiber_g||0);a.k+=(+d.kcal||0);} return a; },{p:0,f:0,k:0});

  let h = `<div class="card" style="background:linear-gradient(135deg,#2e7d32,#43a047);color:#fff;border:none">
    <div class="row sb"><div><h2 style="margin:0;color:#fff">🌿 Eat well today</h2>
      <small style="opacity:.9">Protein-forward, high-fiber, lower-carb — for a long, productive life</small></div>
      <button class="sm" style="background:rgba(255,255,255,.25);color:#fff" onclick="shuffleAll()">🔄 New ideas</button></div></div>`;

  // cuisine filter chips
  const cl = cuisineList();
  if(cl.length>2){ h+=`<div class="chips">${cl.map(c=>`<button class="chip ${c===cuisineFilter?'on':''}" onclick="setCuisine('${c.replace(/'/g,"\\'")}')">${c==='All'?'🍽️ All':esc(c)}</button>`).join('')}</div>`; }

  // daily nutrition meter (per adult, from today's 3 suggestions)
  h+=`<div class="card"><div class="row sb"><h2 style="margin:0">Today's nutrition <small style="color:var(--mut);font-weight:400">/ adult</small></h2>
      <small style="color:var(--mut)">from the 3 meals below</small></div>
    ${bar('💪 Protein', tot.p, TARGET.protein_g, 'g', true)}
    ${bar('🌾 Fiber',   tot.f, TARGET.fiber_g, 'g', true)}
    <small style="color:var(--mut)">${tot.p>=TARGET.protein_g&&tot.f>=TARGET.fiber_g?'✅ Great balance today':'Add a protein snack or ↺ swap a meal to hit protein + fiber goals'}</small></div>`;

  // rotating health coaching tip (verified, highest-leverage)
  const tips = window.COACH_TIPS||[];
  if(tips.length){ const tip = tips[(new Date().getDate()+ (mealOff.breakfast))%tips.length];
    h+=`<div class="card" style="background:#fff8e1;border-color:#ffe082"><div style="font-size:14px">${esc(tip)}</div></div>`; }

  picks.forEach(({m,icon,label,d})=>{
    if(!d){ h+=`<div class="card"><div class="row sb"><b>${icon} ${label}</b>
      <button class="sm p" onclick="addDish()">＋ Add recipe</button></div>
      <div class="empty" style="padding:14px">No healthy ${label.toLowerCase()} yet.</div></div>`; return; }
    const {ok,missing} = canMake(d,4);
    const tags = healthTags(d).map(t=>`<span class="tag">${t}</span>`).join('');
    const macro = (+d.kcal||+d.protein_g) ? `<div class="row" style="gap:14px;font-size:13px;color:var(--mut);margin:6px 0">
        <span>🔥 ${Math.round(+d.kcal||0)} kcal</span><span>💪 ${fmt(+d.protein_g||0)}g protein</span>
        <span>🌾 ${fmt(+d.fiber_g||0)}g fiber</span></div>` : '';
    const swap = d.swapsFor ? `<div style="font-size:12px;color:var(--g);margin-bottom:4px">↪ healthier swap for <b>${esc(d.swapsFor)}</b></div>` : '';
    h+=`<div class="card">
      <div class="row sb"><small style="color:var(--mut);font-weight:600;letter-spacing:.5px">${icon} ${label.toUpperCase()}${d.cuisine?' · '+esc(d.cuisine):''}</small>
        <button class="sm g" onclick="swapMeal('${m}')">↺ swap</button></div>
      <div class="row" style="gap:10px;align-items:center;margin:4px 0">

// ---------- TRACK: meal journal + points/rewards (verified spec loads from data.js) ----------
const RW = window.REWARDS || {
  points:[
    {key:"log_real_meal_photo",label:"Logged a meal",points:10,cap:3},
    {key:"cook_healthy_dish",label:"Cooked a healthy dish",points:20,cap:2},
    {key:"whole_grain_swap",label:"Millet/whole-grain swap",points:15,cap:1}
  ],
  streak:{dailyLogBonus:5,note:"Your total healthy days — never resets."},
  levels:[{name:"Sprout",minPoints:0},{name:"Home Cook",minPoints:150},{name:"Balanced Thali",minPoints:400}],
  badges:[
    {key:"first_real_meal",emoji:"🍽️",label:"First meal",metric:"logs",threshold:1},
    {key:"home_cook",emoji:"🍲",label:"Cooked 5",metric:"cooked",threshold:5},
    {key:"steady_eater",emoji:"🧘",label:"30 healthy days",metric:"days",threshold:30}
  ]
};
function ensureModel(){ if(!S.journal)S.journal=[]; if(S.points==null)S.points=0; if(!S.badges)S.badges=[]; if(!S.awards)S.awards={}; if(!S.counters)S.counters={}; if(!S.earned)S.earned={}; if(S.premiumDays==null)S.premiumDays=0; }
// ----- earn-a-premium-day loop (validated healthy meal → premium days). Positive framing only. -----
function weekKey(){ const d=new Date(); const off=(d.getDay()+6)%7; d.setDate(d.getDate()-off); return d.toISOString().slice(0,10); }
async function validateForReward(e){
  if(!e.photo) return;
  try{
    const r=await fetch('/api/validate-meal',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({imageUrl:e.photo})});
    const v=await r.json();
    if(v.configured===false) return;                 // AI validation not enabled yet (no key)
    if(v.band==='healthy') grantPremiumDay();
    // partial / not_a_plate / review: meal stays logged, no reward, and NO negative label shown (ED guardrail)
  }catch(_){}
}
function grantPremiumDay(){
  ensureModel(); const cfg=RW.earnDays||{perMeal:1,weeklyCap:5}, wk=weekKey();
  if((S.earned[wk]||0) >= cfg.weeklyCap) return;      // weekly cap — anti-farming, silent
  S.earned[wk]=(S.earned[wk]||0)+cfg.perMeal; S.premiumDays=(S.premiumDays||0)+cfg.perMeal;
  toast(`🎁 Healthy meal validated — +${cfg.perMeal} premium day! (${S.premiumDays} banked)`);
  save(); if(TAB==='track') renderTrack();
}
function ptFor(key){ const p=RW.points.find(x=>x.key===key); return p?p.points:0; }
// hard per-day cap per action is the primary anti-farming rule; counters track lifetime milestones
function award(key,silent){ const p=RW.points.find(x=>x.key===key); if(!p)return false; ensureModel();
  const day=todayKey(); S.awards[day]=S.awards[day]||{};
  if((S.awards[day][key]||0) >= (p.cap||99)) return false;                 // daily cap reached → no points
  S.awards[day][key]=(S.awards[day][key]||0)+1; S.counters[key]=(S.counters[key]||0)+1;
  S.points=(S.points||0)+p.points; if(!silent) toast(`+${p.points} · ${p.label} 🌟`); checkBadges(); return true; }
function todayKey(){ return new Date().toISOString().slice(0,10); }
function levelInfo(){ const p=S.points||0; let cur=RW.levels[0], next=null;
  RW.levels.forEach((L,i)=>{ if(p>=L.minPoints){ cur=L; next=RW.levels[i+1]||null; }});
  const span=next?next.minPoints-cur.minPoints:1, into=p-cur.minPoints;
  return {cur,next,pct:next?Math.min(100,Math.round(into/span*100)):100}; }
// forgiving consistency: total distinct healthy days, non-consecutive, never resets (no streak anxiety)
function healthyDays(){ return new Set((S.journal||[]).map(j=>j.date)).size; }
function metricVal(m){ const j=S.journal||[], c=S.counters||{};
  return m==="logs"?(c.log_real_meal_photo||j.length)
    : m==="cooked"?(c.cook_healthy_dish||(S.log||[]).length)
    : m==="millet"?(c.whole_grain_swap||0)
    : m==="days"? new Set(j.map(x=>x.date)).size
    : m==="points"?(S.points||0):0; }
function checkBadges(){ S.badges=S.badges||[]; (RW.badges||[]).forEach(b=>{ if(!S.badges.includes(b.key)&&metricVal(b.metric)>=b.threshold){ S.badges.push(b.key); toast(`🏅 Badge: ${b.label}`); }}); }

    ${(S.premiumDays||0)>0?`<div style="margin-top:10px;background:rgba(255,255,255,.18);border-radius:10px;padding:8px 12px">🎁 <b>${S.premiumDays} premium day${S.premiumDays>1?'s':''}</b> earned — enjoy unlimited AI scans &amp; analytics</div>`:`<div style="margin-top:10px;font-size:12px;opacity:.85">📸 Log a healthy meal with a photo to earn free premium days</div>`}</div>`;

      <div style="padding:7px 9px"><b style="font-size:13px;text-transform:capitalize">${esc(e.meal||'meal')}</b>
        <div><small style="color:var(--mut)">${esc(e.date)}${e.note?' · '+esc(e.note):''}</small></div></div></div>`; });
    h+=`</div>`; }
  h+=`</div>`;
  document.getElementById('view').innerHTML=h;
}

function dlg(html){ let d=document.getElementById('dlg'); if(!d){ d=document.createElement('dialog'); d.id='dlg'; document.body.appendChild(d);} d.innerHTML=html; d.showModal(); }
function closeDlg(){ document.getElementById('dlg')?.close(); }
function val(idv){ return document.getElementById(idv).value; }
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// ---------- CLOUD SYNC (Supabase REST, no SDK) ----------
// One shared row {id, data, updated_at}. Last-write-wins by updated_at. Good enough for a household.
// ponytail: whole-doc last-write-wins; if two people edit offline at once, newest save wins. Move to
//           per-field merge only if that actually bites.
const CFG_KEY = "pantry.sync";
let CFG = JSON.parse(localStorage.getItem(CFG_KEY) || "null") || {url:"",key:"",house:"home",tgToken:"",tgChat:"",cloudName:"",uploadPreset:""};
let pushT;
// ---- account session (Supabase Auth). Signed-in => private per-user row; else shared household row ----
let SESSION = null; try{ SESSION = JSON.parse(localStorage.getItem('pantry.session')||'null'); }catch(e){}
function sbHeaders(){ const auth = SESSION ? SESSION.token : CFG.key; return {apikey:CFG.key, Authorization:"Bearer "+auth, "Content-Type":"application/json"}; }
function syncOn(){ return CFG.url && CFG.key; }
function syncTable(){ return SESSION ? {t:"user_state", k:"user_id", id:SESSION.uid} : {t:"state", k:"id", id:CFG.house}; }
function captureOAuth(){
  if(location.hash && location.hash.indexOf('access_token')>-1){
    const p=new URLSearchParams(location.hash.slice(1)); const t=p.get('access_token');
    if(t) setSession(t, p.get('refresh_token'));
    history.replaceState(null,'',location.pathname);
  }
}
function setSession(token, refresh){
  try{ const c=JSON.parse(atob(token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
    SESSION={token, refresh, uid:c.sub, email:c.email}; localStorage.setItem('pantry.session',JSON.stringify(SESSION));
    toast('✅ Signed in as '+(SESSION.email||'you')); setDot('ok'); pullState(true);
  }catch(e){ toast('Sign-in failed'); }
}
function signOut(){ SESSION=null; localStorage.removeItem('pantry.session'); toast('Signed out'); setDot('ok'); }
function oauth(provider){ if(!syncOn()) return toast('Add Supabase in ⚙ first');
  location.href=`${CFG.url}/auth/v1/authorize?provider=${provider}&redirect_to=${encodeURIComponent(location.origin+'/app.html')}`; }
async function emailLink(){ const email=(document.getElementById('authEmail')||{}).value; if(!email||!email.trim()) return toast('Enter your email');
  if(!syncOn()) return toast('Add Supabase in ⚙ first');
  try{ const r=await fetch(`${CFG.url}/auth/v1/otp?redirect_to=${encodeURIComponent(location.origin+'/app.html')}`,
    {method:'POST', headers:{apikey:CFG.key,'Content-Type':'application/json'}, body:JSON.stringify({email:email.trim(), create_user:true})});
    toast(r.ok?'📧 Check your email for the sign-in link':'Could not send link'); }
  catch(e){ toast('Failed — offline?'); }
}
function setDot(state){ // idle ✓ / syncing … / off ⚙︎ / error ⚠
  document.getElementById('syncDot').textContent = !syncOn()?'⚙︎':{sync:'…',ok:'✓',err:'⚠'}[state]||'☁︎';
}
async function pushState(){
  if(!syncOn()) return;
  clearTimeout(pushT);
  pushT = setTimeout(async()=>{
    setDot('sync');
    try{
      const T=syncTable();
      const row = SESSION ? {user_id:SESSION.uid, data:S, updated_at:new Date().toISOString()}
                          : {id:CFG.house, data:S, updated_at:new Date().toISOString()};
      const r=await fetch(`${CFG.url}/rest/v1/${T.t}?on_conflict=${T.k}`,{method:"POST",
        headers:{...sbHeaders(), Prefer:"resolution=merge-duplicates"}, body:JSON.stringify([row])});
      setDot(r.ok?'ok':'err');
    }catch(e){ setDot('err'); }
  }, 800);
}
async function pullState(force){
  if(!syncOn()) return;
  setDot('sync');
  try{
    const T=syncTable();
    const r=await fetch(`${CFG.url}/rest/v1/${T.t}?${T.k}=eq.${encodeURIComponent(T.id)}&select=data,updated_at`,{headers:sbHeaders()});
    const rows=await r.json();
    if(Array.isArray(rows)&&rows[0]&&rows[0].data){
      const remote=rows[0].updated_at||"", localT=S._t||"";
      if(force===true || remote>localT){ S=rows[0].data; S._t=remote; localStorage.setItem(KEY,JSON.stringify(S)); render(); toast("↕ Synced from cloud"); }
    } else if(force===true){ toast("No cloud data yet — this device will be the source"); }
    setDot('ok');
  }catch(e){ setDot('err'); }
}
// hook save() to also push
const _save=save;
save=function(){ S._t=new Date().toISOString(); _save(); pushState(); };

function settings(){
  const sql = "create table if not exists state (id text primary key, data jsonb, updated_at timestamptz);\n"+
              "alter table state enable row level security;\n"+
              "create policy anon_all on state for all to anon using (true) with check (true);";
  dlg(`<h2>👤 Account &amp; sync</h2>
    ${SESSION
      ? `<div class="card" style="margin:0 0 14px;background:var(--g2);border:none"><b>✅ Signed in</b><br><small>${esc(SESSION.email||'your account')}</small>
          <div style="margin-top:8px"><button class="sm g" onclick="signOut();closeDlg()">Sign out</button></div></div>`
      : `<div style="margin-bottom:14px"><b>Sign in / Sign up — free</b>
          <div style="display:flex;flex-direction:column;gap:8px;margin-top:8px">
            <button class="g" onclick="oauth('google')">🔵 Continue with Google</button>
            <button class="g" onclick="oauth('facebook')">🔷 Continue with Facebook</button>
            <button class="g" onclick="oauth('apple')"> Continue with Apple</button>
          </div>
          <div class="row" style="gap:6px;margin-top:8px"><input id="authEmail" placeholder="you@email.com" style="flex:1"><button class="p" onclick="emailLink()">Email link</button></div>
          <p style="font-size:11px;color:var(--mut);margin:6px 0 0">Free account — syncs your pantry, meals &amp; points privately across devices.</p></div>`}
    <hr style="border:none;border-top:1px solid var(--line);margin:0 0 14px">
    <p style="font-size:13px;color:var(--mut);margin-top:0">Advanced: connect your own Supabase project to self-host data.</p>
    <div class="fld"><label>Supabase Project URL</label><input id="cUrl" value="${esc(CFG.url)}" placeholder="https://xxxx.supabase.co"></div>
    <div class="fld"><label>Supabase anon key</label><input id="cKey" value="${esc(CFG.key)}" placeholder="eyJhbGciOi..."></div>
    <div class="fld"><label>Household code (same on all devices)</label><input id="cHouse" value="${esc(CFG.house)}"></div>
    <div class="row" style="gap:8px"><button class="p" onclick="saveCfg()">Save &amp; sync</button>
      <button class="g" onclick="pullState(true)">⬇ Use cloud data</button></div>
    <p style="font-size:11px;color:var(--mut);margin:6px 0 0">Set up your main device first (Save &amp; sync). On other devices, enter the same details then tap <b>Use cloud data</b>.</p>
    <hr style="border:none;border-top:1px solid var(--line);margin:14px 0">
    <p style="font-size:13px;color:var(--mut);margin:0 0 8px">📲 Ping Pavan's phone with the order (Telegram — free, no server).
      @BotFather → token; message the bot then get chat id.</p>
    <div class="fld"><label>Telegram bot token</label><input id="cTg" value="${esc(CFG.tgToken)}" placeholder="123456:ABC-..."></div>
    <div class="fld"><label>Telegram chat id</label><input id="cChat" value="${esc(CFG.tgChat)}" placeholder="e.g. -1001234567890"></div>
    <hr style="border:none;border-top:1px solid var(--line);margin:14px 0">
    <p style="font-size:13px;color:var(--mut);margin:0 0 8px">📷 Dish photos (Cloudinary — free, no server).
      Create an <b>unsigned</b> upload preset; both values are public-safe.</p>
    <div class="fld"><label>Cloudinary cloud name</label><input id="cCloud" value="${esc(CFG.cloudName)}" placeholder="e.g. sowndarya-kitchen"></div>
    <div class="fld"><label>Unsigned upload preset</label><input id="cPreset" value="${esc(CFG.uploadPreset)}" placeholder="e.g. pantry_unsigned"></div>
    <details style="margin-top:8px"><summary style="font-size:13px;color:var(--g)">First-time DB setup (run once)</summary>
      <p style="font-size:12px;color:var(--mut)">Supabase → SQL editor → paste &amp; run:</p>
      <textarea readonly rows="4" style="width:100%;font-size:11px;font-family:monospace">${esc(sql)}</textarea></details>
    <hr style="border:none;border-top:1px solid var(--line);margin:14px 0">
    <div class="row" style="gap:8px"><button class="g" onclick="exportData()">Export backup</button>
      <button class="g" onclick="importData()">Import</button></div>
    <div class="row sb" style="margin-top:14px"><span></span><button class="g" onclick="closeDlg()">Close</button></div>`);
}
function saveCfg(){ CFG={url:val('cUrl').trim().replace(/\/$/,''), key:val('cKey').trim(), house:val('cHouse').trim()||"home",
    tgToken:val('cTg').trim(), tgChat:val('cChat').trim(), cloudName:val('cCloud').trim(), uploadPreset:val('cPreset').trim()};
  localStorage.setItem(CFG_KEY,JSON.stringify(CFG)); closeDlg(); setDot('ok'); pullState().then(pushState); toast("Saved"); }
// Cloudinary unsigned upload — client-side, no backend, no secret
async function uploadImage(file){
  if(!CFG.cloudName||!CFG.uploadPreset){ toast("Set Cloudinary in ⚙︎ first"); return null; }
  const fd=new FormData(); fd.append('file',file); fd.append('upload_preset',CFG.uploadPreset);
  try{ const r=await fetch(`https://api.cloudinary.com/v1_1/${CFG.cloudName}/image/upload`,{method:'POST',body:fd});
    const j=await r.json(); return j.secure_url||null; }
  catch(e){ toast("Upload failed — offline?"); return null; }
}
async function sendTelegram(){
  if(!CFG.tgToken||!CFG.tgChat) return toast("Set Telegram in ⚙︎ first");
  const lines=S.shop.filter(s=>!s.checked).map(s=>`• ${s.name} — ${s.need}${s.unit}`).join('\n');
  const text="🛒 *Grocery order* (Sowndarya's Pantry)\n"+(lines||"(nothing needed)");
  try{
    const r=await fetch(`https://api.telegram.org/bot${CFG.tgToken}/sendMessage`,{method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({chat_id:CFG.tgChat, text, parse_mode:"Markdown"})});
    toast(r.ok?"📲 Sent to Telegram":"Telegram failed — check token/chat id");
  }catch(e){ toast("Telegram failed — offline?"); }
}
function exportData(){ const b=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});
  const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download="pantry-backup.json"; a.click(); }
function importData(){ const i=document.createElement('input'); i.type="file"; i.accept=".json";
  i.onchange=e=>{ const f=e.target.files[0]; const rd=new FileReader(); rd.onload=()=>{ try{ S=JSON.parse(rd.result); save(); render(); toast("Imported"); closeDlg(); }catch(x){ toast("Bad file"); } }; rd.readAsText(f); }; i.click(); }

// ---------- boot ----------
captureOAuth();
autoRestock(); _save(); go('meals'); setDot('ok');
if(syncOn()) pullState();
document.addEventListener('visibilitychange',()=>{ if(!document.hidden) pullState(); });
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});

// ---- tiny self-check (open console): verifies cook-deduct + auto-restock math ----
function _selfTest(){
  const p={id:'t',name:'TestRice',qty:100,unit:'g',low:30}; S.pantry.push(p);
  const before=p.qty; const need=20*3;               // 20g/person * 3 ppl
  p.qty=Math.max(0,before-need);
  console.assert(p.qty===40, "deduct failed", p.qty);
  p.qty=20; autoRestock();                            // 20<=30 -> should be on order list
  console.assert(S.shop.some(s=>s.name==='TestRice'), "restock flag failed");
  S.pantry=S.pantry.filter(x=>x.id!=='t'); S.shop=S.shop.filter(s=>s.name!=='TestRice');
  console.log("selfTest ok");
}
</script>
</body>
</html>
